# ============================================================
#  eBPF 网络攻击检测系统 - Nginx 配置
#  功能：托管 Dashboard 静态页面 + 反向代理后端 API
#  注意：在 Docker Compose 中，backend 是服务名
# ============================================================

server {
    # 监听 80 端口
    listen 80;
    server_name localhost;

    # 字符集
    charset utf-8;

    # ============================================================
    #  静态页面托管
    # ============================================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # 解决 SPA 路由问题
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    #  反向代理后端 API（Docker 内部网络）
    #  后端服务名：backend（由 docker-compose 定义）
    # ============================================================
    location /api/ {
        proxy_pass http://backend:5000/api/;

        # 传递原始请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;

        # 关闭缓存（实时数据不需要缓存）
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ============================================================
    #  WebSocket 代理（实时告警推送）
    # ============================================================
    location /ws/ {
        proxy_pass http://backend:5000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================================
    #  安全头
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================================
    #  日志配置
    # ============================================================
    access_log /var/log/nginx/dashboard_access.log;
    error_log /var/log/nginx/dashboard_error.log;
}
